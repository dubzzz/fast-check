packages:
  - examples
  - packages/*
  - website

overrides:
  tmp@<0.2.4: ~0.2.4
  serialize-javascript@<7.0.5: ~7.0.5
  follow-redirects@<1.16.0: ~1.16.0
  lodash-es@<4.18.0: ~4.18.0
  dompurify@<3.4.0: ~3.4.0

allowBuilds:
  '@swc/core': false
  core-js: false
  core-js-pure: false
  es5-ext: false
  esbuild: false
  unrs-resolver: false

trustPolicy: no-downgrade
trustPolicyIgnoreAfter: 20160

blockExoticSubdeps: true

linkWorkspacePackages: deep
