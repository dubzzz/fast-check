name: Claude Code

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  issues:
    types: [opened, assigned]
  pull_request_review:
    types: [submitted]

permissions: {}

jobs:
  claude:
    if: |
      github.actor == 'dubzzz' &&
      (
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude')) ||
        (github.event_name == 'pull_request_review' && contains(github.event.review.body, '@claude')) ||
        (github.event_name == 'issues' && (contains(github.event.issue.body, '@claude') || contains(github.event.issue.title, '@claude')))
      )
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
      actions: read # Required for Claude to read CI results on PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 1
          persist-credentials: true
      - name: Run Claude Code
        id: claude
        uses: anthropics/claude-code-action@fefa07e9c665b7320f08c3b525980457f22f58aa # v1.0.111
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: '@claude'
          assignee_trigger: 'dubzzz'
          claude_args: |
            --model opus
            --append-system-prompt "## Pull Request Guidelines

            When opening a pull request, follow the gitmoji specification:

            - For changes to the main `fast-check` package: `emoji Description`
              - Example: `✨ Add new arbitrary for dates`
            - For changes to other packages (ava, vitest, jest, worker, poisoning, packaged): `emoji(package-name) Description`
              - Example: `🐛(jest) Fix compatibility with jest 29`

            Limit the description part to at most 50 characters.

            Common gitmoji: ✨ features, 🐛 bug fix, 📝 docs, ✅ tests, 🏷️ types, ⚡️ perf, 👷 CI, ♻️ refactor, 🔧 config, 🎨 format, 🔥 remove, ⬆️ upgrade, 🗑️ deprecate

            Always use the PR template from `.github/PULL_REQUEST_TEMPLATE.md`. The body must include:
            1. **Description** section — short description and link to related issues
            2. **Checklist** section — keep all checklist items; only check boxes that are fulfilled

            Do not delete, reorder, or skip any sections or checklist items from the template."

          # Optional: Customize the trigger phrase (default: @claude)
          # trigger_phrase: "/claude"

          # Optional: Trigger when specific user is assigned to an issue
          # assignee_trigger: "claude-bot"

          # Optional: Configure Claude's behavior with CLI arguments
          # claude_args: |
          #   --model claude-opus-4-1-20250805
          #   --max-turns 10
          #   --allowedTools "Bash(npm install),Bash(npm run build),Bash(npm run test:*),Bash(npm run lint:*)"
          #   --system-prompt "Follow our coding standards. Ensure all new code has tests. Use TypeScript for new files."

          # Optional: Advanced settings configuration
          # settings: |
          #   {
          #     "env": {
          #       "NODE_ENV": "test"
          #     }
          #   }
