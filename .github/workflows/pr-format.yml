name: PR Format

on:
  workflow_dispatch:
    inputs:
      ref_value:
        description: 'PR number'
        required: true
        type: string

permissions: {}

jobs:
  format:
    name: 'Format code and commit changes'
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: read
    steps:
      - name: Determine checkout reference
        id: ref
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.inputs.ref_value }}
          REPO: ${{ github.repository }}
        run: |
          PR_INFO=$(gh pr view "$PR_NUMBER" --repo "$REPO" --json headRefName,baseRefName)
          HEAD_BRANCH=$(echo "$PR_INFO" | jq -r '.headRefName')
          BASE_BRANCH=$(echo "$PR_INFO" | jq -r '.baseRefName')
          echo "ref=$HEAD_BRANCH" >> "$GITHUB_OUTPUT"
          echo "base=$BASE_BRANCH" >> "$GITHUB_OUTPUT"
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ steps.ref.outputs.ref }}
          fetch-depth: 0
          persist-credentials: true
      # The workflow runs `pnpm format:check` and `pnpm format`. pnpm/npm also
      # invoke matching pre/post scripts. If any of those entries diverges from
      # the base branch, the PR is asking us to execute attacker-controlled code
      # with a writable token in scope — refuse. When the entries match, running
      # them is no more dangerous than running `pnpm format` on the base branch.
      - name: Verify format scripts match base branch
        env:
          BASE_BRANCH: ${{ steps.ref.outputs.base }}
        run: |
          git fetch --no-tags --depth=1 origin "$BASE_BRANCH"
          git show "origin/$BASE_BRANCH:package.json" > /tmp/base-package.json
          mismatch=0
          for key in preformat format postformat 'preformat:check' 'format:check' 'postformat:check'; do
            PR_VAL=$(jq -r --arg k "$key" '.scripts[$k] // "<unset>"' package.json)
            BASE_VAL=$(jq -r --arg k "$key" '.scripts[$k] // "<unset>"' /tmp/base-package.json)
            if [ "$PR_VAL" != "$BASE_VAL" ]; then
              echo "::error::PR modifies scripts.\"$key\" in package.json — refusing to execute PR-controlled format code."
              echo "  base ($BASE_BRANCH): $BASE_VAL"
              echo "  PR head:             $PR_VAL"
              mismatch=1
            fi
          done
          rm -f /tmp/base-package.json
          if [ "$mismatch" -ne 0 ]; then
            exit 1
          fi
          echo "✅ All format-related script entries are identical to origin/$BASE_BRANCH"
      - name: Install pnpm
        uses: pnpm/action-setup@0e279bb959325dab635dd2c09392533439d90093 # v6.0.8
      - name: Using Node v24.x
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: '24.x'
          cache: 'pnpm'
      # `--ignore-scripts` is required: the script-equality check above does not
      # cover lockfile/dependency lifecycle hooks, so any install must skip them.
      - name: Install dependencies
        run: pnpm install --frozen-lockfile --ignore-scripts
      - name: Check current branch info
        env:
          PR_NUMBER: ${{ github.event.inputs.ref_value }}
        run: |
          echo "Requested PR: $PR_NUMBER"
          echo "Current branch: $(git branch --show-current)"
          echo "Current commit: $(git rev-parse HEAD)"
      - name: Check if formatting is needed
        id: format_check
        run: |
          if ! pnpm format:check; then
            echo "changes_needed=true" >> "$GITHUB_OUTPUT"
          else
            echo "changes_needed=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Run format
        if: steps.format_check.outputs.changes_needed == 'true'
        run: pnpm format
      - name: Configure git
        if: steps.format_check.outputs.changes_needed == 'true'
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
      - name: Commit formatting changes
        if: steps.format_check.outputs.changes_needed == 'true'
        env:
          WORKFLOW_NAME: ${{ github.workflow }}
          RUN_ID: ${{ github.run_id }}
          PR_NUMBER: ${{ github.event.inputs.ref_value }}
        run: |
          git add .
          if ! git diff --cached --quiet; then
            echo "Committing formatting changes..."
            git commit -m "💄 Format code with prettier

            Applied by GitHub Action workflow: $WORKFLOW_NAME
            Run ID: $RUN_ID
            Target PR: $PR_NUMBER"

            echo "Pushing changes..."
            git push
          else
            echo "No changes to commit after formatting"
          fi
      - name: Output result
        env:
          CHANGES_NEEDED: ${{ steps.format_check.outputs.changes_needed }}
        run: |
          if [ "$CHANGES_NEEDED" = "true" ]; then
            echo "✅ Formatting changes have been committed and pushed"
          else
            echo "✅ Code is already properly formatted, no changes needed"
          fi
